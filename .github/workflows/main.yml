name: Build Tweak
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Tweak
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Tweak Files
        run: |
          cat << 'EOF' > Tweak.x
          #import <Foundation/Foundation.h>
          
          %hook FRTweaksAuthController
          // Her türlü doğrulama ve geçerlilik her zaman YES dönecek
          - (BOOL)isVerified { return YES; }
          - (BOOL)isValid { return YES; }
          - (BOOL)isUnlocked { return YES; }
          - (BOOL)requireAuth { return NO; } // Account girişi sormasın
          
          // Kilit ekranını (Web/Account) getiren fonskiyonları durdur!
          - (void)presentUnlockFromViewController:(id)vc completion:(void (^)(BOOL))completion {
              if (completion) { completion(YES); }
          }
          - (void)presentUnlockForLock:(id)lock fromViewController:(id)vc completion:(void (^)(BOOL))completion {
              if (completion) { completion(YES); }
          }
          %end
          
          // Ayarlar sayfasındaki kilit (padlock) ikonlarını ve durumlarını yöneten sınıf
          %hook RGFeatureLock
          - (BOOL)isUnlocked { return YES; }
          - (BOOL)isLocked { return NO; } // Asla kilitli değil
          - (BOOL)isVerified { return YES; }
          %end
          
          // Reels ve diğer gizli yerlerdeki kilitler
          %hook RGReelsUnlockHandler
          - (BOOL)isUnlocked { return YES; }
          %end
          
          // Ayar Yöneticisinde premium kontrolü
          %hook RGSettingsManager
          - (BOOL)isVerified { return YES; }
          - (BOOL)isUnlocked { return YES; }
          %end
          
          // UserDefaults (Uygulamanın kendi ayar kayıtlarına da sızıyoruz)
          %hook NSUserDefaults
          - (BOOL)boolForKey:(NSString *)defaultName {
              if (defaultName && [defaultName isKindOfClass:[NSString class]]) {
                  NSString *lower = [defaultName lowercaseString];
                  if ([lower containsString:@"verified"] || 
                      [lower containsString:@"isunlocked"] || 
                      [lower containsString:@"ispro"] || 
                      [lower containsString:@"ispremium"] || 
                      [lower containsString:@"haslicense"] ||
                      [lower containsString:@"requireauth"]) {
                      return YES;
                  }
              }
              return %orig;
          }
          %end
          EOF
          
          cat << 'EOF' > Makefile
          TARGET := iphone:clang:latest:14.0
          INSTALL_TARGET_PROCESSES = Instagram
          include $(THEOS)/makefiles/common.mk
          TWEAK_NAME = RegramBypass
          RegramBypass_FILES = Tweak.x
          RegramBypass_CFLAGS = -fobjc-arc
          include $(THEOS_MAKE_PATH)/tweak.mk
          EOF
          
          cat << 'EOF' > RegramBypass.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict><key>Filter</key><dict><key>Bundles</key><array><string>com.burbn.instagram</string></array></dict></dict></plist>
          EOF

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git theos
          
      - name: Setup iOS SDK
        run: |
          rm -rf theos/sdks
          git clone https://github.com/theos/sdks.git theos/sdks

      - name: Install ldid
        run: brew install ldid

      - name: Build
        run: |
          export THEOS=${GITHUB_WORKSPACE}/theos
          make

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RegramBypass_dylib
          path: .theos/obj/debug/RegramBypass.dylib
